apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-service
  namespace: production
  labels:
    app: product-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: product-service

  template:
    metadata:
      labels:
        app: product-service

    spec:
      containers:
        - name: product-service

          image: shepherd777/product-service:3067d41
          imagePullPolicy: Always

          ports:
            - containerPort: 5002

          env:
            - name: HOST_IP
              value: "0.0.0.0"

            - name: PORT
              value: "5002"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "200m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 5002

            initialDelaySeconds: 10
            periodSeconds: 10


          readinessProbe:
            httpGet:
              path: /health
              port: 5002

            initialDelaySeconds: 5
            periodSeconds: 5
