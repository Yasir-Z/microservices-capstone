apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: "nginx:alpine" # In production, this pulls your pre-built UI asset container image
          ports:
            - containerPort: {{ .Values.frontend.internalPort }}
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.internalPort }}
      targetPort: {{ .Values.frontend.internalPort }}
      protocol: TCP
  selector:
    app: frontend
