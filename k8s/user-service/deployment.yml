apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: production
  labels:
    app: user-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:
      containers:
        - name: user-service
          image: shepherd777/user-service:3067d41
          imagePullPolicy: Always

          ports:
            - containerPort: 5001

          env:
            - name: HOST_IP
              value: "0.0.0.0"

            - name: PORT
              value: "5001"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "200m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 5001

            initialDelaySeconds: 10
            periodSeconds: 10


          readinessProbe:
            httpGet:
              path: /health
              port: 5001

            initialDelaySeconds: 5
            periodSeconds: 5
