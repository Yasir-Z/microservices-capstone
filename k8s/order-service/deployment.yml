apiVersion: apps/v1
kind: Deployment

metadata:
  name: order-service
  namespace: production
  labels:
    app: order-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:

        - name: order-service

          image: shepherd777/order-service:3067d41
          imagePullPolicy: Always

          ports:
            - containerPort: 5003

          env:
            - name: HOST_IP
              value: "0.0.0.0"

            - name: PORT
              value: "5003"

          resources:

            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "200m"
              memory: "256Mi"


          livenessProbe:

            httpGet:
              path: /health
              port: 5003

            initialDelaySeconds: 10
            periodSeconds: 10


          readinessProbe:

            httpGet:
              path: /health
              port: 5003

            initialDelaySeconds: 5
            periodSeconds: 5
