name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ==========================================
  # STAGE 1: SECURITY AND LINT 
  # ==========================================
  security-and-lint:
    name: DevSecOps Code Quality & Linting
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Lint Dockerfiles (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: error

      - name: Scan Repository for Secrets & Vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '1'          
          severity: 'CRITICAL,HIGH'

  # ==========================================
  # STAGE 2: BUILD, PORT ISOLATION & TEST
  # ==========================================
  build-and-test:
    name: Build & Integration Test
    needs: security-and-lint
    runs-on: ubuntu-latest
   
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Build Stack via Docker Compose
        run: |
          docker compose build

      - name: Spin up Stack in Background 
        run: |
          docker compose up -d
          sleep 12
      
      - name: Assert Port Isolation (DevSecOps Gate)
        run: |
          echo "Verifying host network isolation..."
          # This request MUST fail because host port forwarding is completely blocked
          if curl --max-time 3 http://localhost:5001/users; then
            echo "SECURITY BREACH: Backend container port 5001 is accessible on the host!" && exit 1
          else
            echo "Port Isolation Verified: Microservices hidden successfully behind API Gateway."
          fi

      - name: Run Gateway Integration Tests
        run: |
          echo "Executing end-to-end Nginx Routing Tests..."
          
          # 1. Verify static frontend serves correctly
          curl -f http://localhost/

          # 2. Verify dynamic user registration and creation
          USER_RESPONSE=$(curl -s -X POST http://localhost/users \
            -H "Content-Type: application/json" \
            -d '{"name": "Pipeline Test User", "email": "devsecops@cloudshop.com"}')
          
          echo "User Creation Response: $USER_RESPONSE"
          
          if [[ "$USER_RESPONSE" == *"devsecops@cloudshop.com"* ]]; then
            echo "API Gateway Integration Flow OK!"
          else
            echo "Integration Flow Failed!" && exit 1
          fi

      - name: Teardown Testing Network
        if: always()
        run: |
          docker compose down --volumes --remove-orphans                

  # ==========================================
  # STAGE 3: CONTAINER SCANNING & SECURE DEPLOY
  # ==========================================
  scan-and-deploy:
    name: Image Scan & Registry Delivery
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
     
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4    
    
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Short Git Commit SHA
        id: git_meta
        run: |
          # Store the 7-character short SHA into the environment variables context
          SHA_TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHA_TAG=${SHA_TAG}" >> $GITHUB_ENV
          echo "Extracted short SHA tag: ${SHA_TAG}"

      - name: Build Microservice Images Locally
        run: |
          # Dynamically loop and build each service using its own Dockerfile context
          REGISTRY="${{ secrets.DOCKERHUB_USERNAME }}"
          SERVICES=("user-service" "product-service" "order-service")
          
          for SERVICE in "${SERVICES[@]}"; do
            echo "Building $SERVICE..."
            docker build --no-cache -f ${SERVICE}/Dockerfile -t ${REGISTRY}/${SERVICE}:${{ env.SHA_TAG }} ./${SERVICE}
          done

      - name: Scan All Microservice Images for OS-Level Vulnerabilities
        run: |
          # Define array of your project images matching registry target
          IMAGES=(
            "${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ env.SHA_TAG }}"
            "${{ secrets.DOCKERHUB_USERNAME }}/product-service:${{ env.SHA_TAG }}"
            "${{ secrets.DOCKERHUB_USERNAME }}/order-service:${{ env.SHA_TAG }}"
          )

          # Loop through and scan each target image back-to-back using native Trivy CLI
          for IMAGE in "${IMAGES[@]}"; do
            echo "--------------------------------------------------------"
            echo "Scanning Target Image: $IMAGE"
            echo "--------------------------------------------------------"
            trivy image --format table --exit-code 1 --ignore-unfixed --severity CRITICAL "$IMAGE"
          done

      - name: Login to Dockerhub Registry 
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}        
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Secure Production Images (Short SHA Only)
        run: |
          # Push all pristine, scan-passed images to the remote hub registry
          REGISTRY="${{ secrets.DOCKERHUB_USERNAME }}"
          SERVICES=("user-service" "product-service" "order-service")
          
          echo "Delivering production artifacts with tag: ${{ env.SHA_TAG }}"
          for SERVICE in "${SERVICES[@]}"; do
            docker push ${REGISTRY}/${SERVICE}:${{ env.SHA_TAG }}
          done
