name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Stage 1: Security and Lint 
  security-and-lint:
    name: DevSecOps Code Quality & Linting
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Lint Dockerfiles (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: error

      - name: Scan Repository for Secrets & Vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '1'          
          severity: 'CRITICAL,HIGH'

  # Stage 2: BUILD, PORT ISOLATION & TEST
  build-and-test:
    name: Build & Integration Test
    needs: security-and-lint
    runs-on: ubuntu-latest
   
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Build Stack via Docker Compose
        run: |
          docker compose build

      - name: Spin up Stack in Background 
        run: |
          docker compose up -d
          sleep 12
      
      - name: Assert Port Isolation (DevSecOps Gate)
        run: |
          echo "Verifying host network isolation..."
          # This request MUST fail because host port forwarding is completely blocked
          if curl --max-time 3 http://localhost:5001/users; then
            echo "SECURITY BREACH: Backend container port 5001 is accessible on the host!" && exit 1
          else
            echo "Port Isolation Verified: Microservices hidden successfully behind API Gateway."
          fi

      - name: Run Gateway Integration Tests
        run: |
          echo "Executing end-to-end Nginx Routing Tests..."
          
          # 1. Verify static frontend serves correctly
          curl -f http://localhost/

          # 2. Verify dynamic user registration and creation
          USER_RESPONSE=$(curl -s -X POST http://localhost/users \
            -H "Content-Type: application/json" \
            -d '{"name": "Pipeline Test User", "email": "devsecops@cloudshop.com"}')
          
          echo "User Creation Response: $USER_RESPONSE"
          
          if [[ "$USER_RESPONSE" == *"devsecops@cloudshop.com"* ]]; then
            echo "API Gateway Integration Flow OK!"
          else
            echo "Integration Flow Failed!" && exit 1
          fi

    


